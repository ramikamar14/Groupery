name: Setup SSH on port 443 (sslh)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/setup-ssh-grouperry-NQS8l
    paths:
      - '.github/workflows/setup-ssh-443.yml'

jobs:
  setup:
    name: Configure sslh to multiplex SSH+HTTPS on port 443
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Setup sslh on port 443
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
          set -e

          echo "=== Installing sslh ==="
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y sslh

          SSLH_BIN=$(ls /usr/sbin/sslh-select /usr/sbin/sslh-fork /usr/sbin/sslh 2>/dev/null | head -1)
          echo "Using binary: $SSLH_BIN"

          echo "=== Moving nginx from 443 to 4443 ==="
          for f in /etc/nginx/sites-enabled/*; do
            if grep -q "listen 443" "$f" 2>/dev/null; then
              echo "Patching $f"
              sudo sed -i 's/listen 443/listen 4443/g' "$f"
              sudo sed -i 's/listen \[::\]:443/listen [::]:4443/g' "$f"
            fi
          done
          sudo nginx -t
          sudo systemctl reload nginx
          echo "nginx moved to 4443"

          echo "=== Creating sslh systemd override ==="
          sudo mkdir -p /etc/systemd/system/sslh.service.d
          printf '[Service]\nExecStart=\nExecStart=%s --foreground --user sslh --listen 0.0.0.0:443 --ssh 127.0.0.1:22 --tls 127.0.0.1:4443\n' "$SSLH_BIN" \
            | sudo tee /etc/systemd/system/sslh.service.d/override.conf

          echo "=== Starting sslh ==="
          sudo systemctl daemon-reload
          sudo systemctl enable sslh
          sudo systemctl restart sslh
          sleep 2
          sudo systemctl status sslh --no-pager

          echo "=== Verify port 443 ==="
          sudo ss -tlnp | grep :443

          echo "=== Done - SSH now accessible on port 443 ==="
          ENDSSH
