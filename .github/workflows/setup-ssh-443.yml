name: Setup SSH on port 443 (sslh)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/setup-ssh-grouperry-NQS8l
    paths:
      - '.github/workflows/setup-ssh-443.yml'

jobs:
  setup:
    name: Configure sslh to multiplex SSH+HTTPS on port 443
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Configure sslh on server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
          set -e

          echo "=== Current port 443 usage ==="
          sudo ss -tlnp | grep :443 || echo "nothing on 443"

          echo "=== Installing sslh ==="
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y sslh

          echo "=== Detecting what is on port 443 ==="
          if sudo ss -tlnp | grep -q ":443"; then
            if systemctl is-active --quiet nginx; then
              NGINX_CONF=$(grep -rl "listen 443" /etc/nginx/sites-enabled/ 2>/dev/null | head -1)
              if [ -n "$NGINX_CONF" ]; then
                echo "Moving nginx from 443 to 4443 in $NGINX_CONF"
                sudo sed -i "s/listen 443 ssl/listen 4443 ssl/g; s/listen \[\:\:\]:443 ssl/listen [::]:4443 ssl/g" "$NGINX_CONF"
                sudo nginx -t && sudo systemctl reload nginx
              fi
            fi
          fi

          echo "=== Configuring sslh ==="
          printf '%s\n' \
            'DAEMON_OPTS="--user sslh --listen 0.0.0.0:443 --ssh 127.0.0.1:22 --tls 127.0.0.1:4443 --pidfile /var/run/sslh/sslh.pid"' \
            'RUN=yes' \
            | sudo tee /etc/default/sslh > /dev/null

          echo "=== Starting sslh ==="
          sudo systemctl enable sslh
          sudo systemctl restart sslh
          sleep 2
          sudo systemctl status sslh --no-pager

          echo "=== Done. SSH now accessible on port 443 ==="
          ENDSSH
