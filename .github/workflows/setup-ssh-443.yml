name: Setup SSH on port 443 (sslh)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/setup-ssh-grouperry-NQS8l
    paths:
      - '.github/workflows/setup-ssh-443.yml'

jobs:
  setup:
    name: Configure sslh to multiplex SSH+HTTPS on port 443
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Configure sslh on server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
          set -ex

          echo "=== OS info ==="
          lsb_release -a 2>/dev/null || cat /etc/os-release

          echo "=== What is listening on 443? ==="
          sudo ss -tlnp | grep :443 || echo "nothing on 443"

          echo "=== Installing sslh ==="
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -q
          sudo apt-get install -y sslh

          echo "=== sslh binary location ==="
          which sslh || which sslh-select || ls /usr/sbin/sslh* 2>/dev/null

          echo "=== Move nginx off port 443 if needed ==="
          if sudo ss -tlnp | grep -q ":443"; then
            echo "Port 443 is occupied, checking nginx..."
            if systemctl is-active --quiet nginx; then
              NGINX_CONF=$(grep -rl "listen 443" /etc/nginx/sites-enabled/ 2>/dev/null | head -1)
              if [ -n "$NGINX_CONF" ]; then
                echo "Updating $NGINX_CONF"
                sudo sed -i "s/listen 443 ssl/listen 4443 ssl/g" "$NGINX_CONF"
                sudo sed -i "s/listen \[::\]:443 ssl/listen [::]:4443 ssl/g" "$NGINX_CONF"
                sudo nginx -t
                sudo systemctl reload nginx
                echo "nginx moved to 4443"
              else
                echo "nginx running but no 443 vhost found in sites-enabled"
                sudo grep -r "443" /etc/nginx/sites-enabled/ || true
              fi
            fi
          fi

          echo "=== Stop any existing sslh service ==="
          sudo systemctl stop sslh 2>/dev/null || true
          sudo pm2 delete sslh 2>/dev/null || true

          echo "=== Launch sslh via pm2 ==="
          SSLH_BIN=$(which sslh-select 2>/dev/null || which sslh 2>/dev/null || echo "/usr/sbin/sslh-select")
          echo "Using sslh binary: $SSLH_BIN"

          sudo pm2 start "$SSLH_BIN" \
            --name sslh \
            -- -f \
               --listen 0.0.0.0:443 \
               --ssh 127.0.0.1:22 \
               --tls 127.0.0.1:4443
          sudo pm2 save

          echo "=== pm2 status ==="
          sudo pm2 list

          echo "=== Verify port 443 ==="
          sleep 2
          sudo ss -tlnp | grep :443

          echo "=== Done. SSH accessible on port 443 ==="
          ENDSSH
