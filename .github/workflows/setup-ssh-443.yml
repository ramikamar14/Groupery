name: Setup SSH on port 443 (sslh)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/setup-ssh-grouperry-NQS8l
    paths:
      - '.github/workflows/setup-ssh-443.yml'

jobs:
  setup:
    name: Configure sslh to multiplex SSH+HTTPS on port 443
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Diagnostics
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
          echo "--- OS ---"
          cat /etc/os-release | grep PRETTY
          echo "--- Ports in use ---"
          sudo ss -tlnp
          echo "--- nginx sites-enabled ---"
          ls /etc/nginx/sites-enabled/ 2>/dev/null || echo "no nginx"
          echo "--- sshd config ---"
          grep -i "^Port" /etc/ssh/sshd_config || echo "no explicit port (default 22)"
          ENDSSH

      - name: Configure SSH on port 443
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
          set -e

          # Move nginx off 443 -> 4443 if needed
          if sudo ss -tlnp | grep -q ":443 "; then
            echo "Something on 443, checking nginx..."
            for f in /etc/nginx/sites-enabled/*; do
              if sudo grep -q "443" "$f" 2>/dev/null; then
                echo "Patching $f"
                sudo sed -i 's/listen 443/listen 4443/g' "$f"
                sudo sed -i 's/listen \[::\]:443/listen [::]:4443/g' "$f"
              fi
            done
            sudo nginx -t && sudo systemctl reload nginx
            echo "nginx moved to 4443"
            sleep 1
          fi

          # Add Port 443 to sshd if not already there
          if ! sudo grep -q "^Port 443" /etc/ssh/sshd_config; then
            echo "Port 443" | sudo tee -a /etc/ssh/sshd_config
            echo "Added Port 443 to sshd_config"
          else
            echo "Port 443 already in sshd_config"
          fi

          sudo sshd -t
          sudo systemctl restart sshd
          sleep 2
          sudo ss -tlnp | grep sshd
          echo "Done - sshd now on port 22 and 443"
          ENDSSH
