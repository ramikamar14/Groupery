name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload dist & restart
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          tar czf dist.tar.gz dist/
          sshpass -e scp -o StrictHostKeyChecking=no dist.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/rami/Groupery/
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /home/rami/Groupery && tar xzf dist.tar.gz && rm dist.tar.gz && \
             pm2 set groupery:ESCROW_API_KEY '${{ secrets.ESCROW_API_KEY }}' 2>/dev/null || true && \
             pm2 restart groupery && echo '✅ Deployed at \$(date)'"
