name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Apply DB migrations (only if DATABASE_URL secret is set)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "Running drizzle-kit push…"
            npm run db:push || echo "⚠️ db:push reported an issue (non-fatal)"
          else
            echo "DATABASE_URL secret not set — skipping migrations. Run 'npm run db:push' on the server before enabling Stripe."
          fi

      - name: Build
        # VITE_* are baked into the client bundle at build time. Unset secrets
        # resolve to empty → analytics stays "none" and Stripe UI stays hidden.
        env:
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_ANALYTICS_PROVIDER: ${{ secrets.VITE_ANALYTICS_PROVIDER }}
          VITE_PLAUSIBLE_DOMAIN: ${{ secrets.VITE_PLAUSIBLE_DOMAIN }}
          VITE_GA4_ID: ${{ secrets.VITE_GA4_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload dist & restart
        # The app reads env from /home/rami/Groupery/.env (loaded by
        # ecosystem.config.cjs). Secrets are written to a DATA file
        # (env-updates.txt) — never interpolated into a shell command — then
        # merged atomically server-side, preserving existing keys.
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          ESCROW_API_KEY: ${{ secrets.ESCROW_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PLATFORM_FEE_BPS: ${{ secrets.STRIPE_PLATFORM_FEE_BPS }}
        run: |
          # Build env-updates.txt as pure data (printf, no shell interpretation).
          : > env-updates.txt
          add_kv() { [ -n "$2" ] && printf '%s=%s\n' "$1" "$2" >> env-updates.txt || true; }
          add_kv ESCROW_API_KEY "$ESCROW_API_KEY"
          add_kv STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
          add_kv STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"
          add_kv STRIPE_PLATFORM_FEE_BPS "$STRIPE_PLATFORM_FEE_BPS"

          tar czf dist.tar.gz dist/ ecosystem.config.cjs script/apply-env.sh env-updates.txt
          sshpass -e scp -o StrictHostKeyChecking=no dist.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/rami/Groupery/
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /home/rami/Groupery && rm -rf dist && tar xzf dist.tar.gz && rm dist.tar.gz && \
             sh script/apply-env.sh && \
             pm2 startOrReload ecosystem.config.cjs --update-env && echo '✅ Deployed at \$(date)'"
